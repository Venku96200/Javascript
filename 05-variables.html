
<!DOCTYPE html>

<html>
    <head>
        <title> variables</title>
    </head>
    <body>
        <script>
            let variable1=3;
            console.log(variable1);

            let calculation=2+3*7;
            console.log(calculation);
            console.log(calculation +2);

             let message='hello';
             console.log(message);

             
            const variable2=3; // const= can't change its value later

            var variable3=3;

        // Hence there are three ways to create variable (Let,Const,Var)
           
        </script>
    </body>
</html>
