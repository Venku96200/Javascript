<!DOCTYPE html>

<html>
    <head>
        <title> Learning JS</title>
        <style>
            .red{
                background-color: red;
                border:none;
                border-radius: 20px;
            }
            .Yellow{
                background-color: yellow;
                border-width:1px;
                border-radius: 20px;
            }
        </style>
    </head>
    <body>
        <!-- When clicked 'good boy!' popsup -->
        <button class="red" onclick="alert('good boy!')">
            HELLO
        </button>
        <p>

            paragraph of <button class="Yellow"> HELLO</button>
        </p>

        <script>
            //This code creates a popup
            /*
              This is a multiline 
              comment.
            */
            //alert('hello');
            console.log(2+2);  // This gives an output(2) in the console
            console.log('some' + 'text')
        </script>
    </body>
</html>
