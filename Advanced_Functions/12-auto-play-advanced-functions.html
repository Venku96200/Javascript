<!DOCTYPE html>
<html>
    <head>
        <title> Rock Paper Scissors</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <p style="font-size:30px;
                  font-weight:bold"> Rock Paper Scissors</p>
        <button class="move-button" onclick="
                result('rock');
                 "><img class ="move-icon" src="rock-emoji.png" ></button>
        <button class="move-button" onclick="
                result('paper');
                 "><img class ="move-icon" src="paper-emoji.png" ></button>
        <button class="move-button" onclick=" 
                result('scissor');
                 "><img class ="move-icon" src="scissor-emoji.png" ></button>
        <p class="js-result"></p>   
        <p class="js-score"></p>      
        <button class="Reset js-reset"> Reset Score</button>         <!--Removed onclick attribute, instead we will use EventListeners--> 
        <button class="js-auto-play autoplay">Auto Play</button>     <!--Removed onclick attribute, instead we will use EventListeners--> 

        <div class="Warning css-warning"></div>
        <script src="12auto-play.js"> </script>

    </body>
</html>
