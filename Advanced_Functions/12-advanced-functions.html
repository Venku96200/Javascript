<!DOCTYPE html>
<html>
    <head>
        <title> Advanced Functions </title>
    </head>
    <body>
        <button class="js-button"> </button>
        <script>
            // Functions Are values (ie, we can save a function inside a variable)
            const function1= function greeting(){
                console.log('hello2');
            };

            console.log(function1);   // Outputs the entire function
            console.log(typeof function1) // outputs 'Function'

            // Calling the function

            function1();   // This is same as greeting(), hence the function name greeting() is optinal, hence we get Anonymous Function

            // Anonymous Function: Funtion without a name
            const function2=function() {
                console.log('This is a anonymous Function');
            }

            //One disadvantage of using functions as values is that we cannot call them before
            //declaring(this is known as Hoisting)
//----------------------------------------------------------------------------------------------------------------------------------------------------

            // What else can we do with a value?

            // (1) save the value in a object
            const object1={
                num:2,
                fun:function freeting(){
                    console.log('hello2');
                }
            };
            object1.fun();

            // (2) We can pass a value into a function (ie Passing Functions into a Function)


            function run(param){
                param();
            }
            run(function(){
                console.log('hello4');   // This is known as Callback function
            });

            // Some other Features:-

            // 1)setTimeout() :- allows us to run a function in the future

            //setTimeout(function,How_long_to_wait(millisec))

            setTimeout(function(){      // Just like a Timer in alarm
                console.log('timeout');
            }, 3000);

            console.log('Next Line')  // This line will print first than 'timeout' is printed  (Asynchronous Code)

            //Asynchronous Code
            //The compiler wont wait for a line to finish before going to the next line

            //Synchronous Code (all most all the code)
            //The compiler will wait for one line to finish before going to the next line

            //2) setInterval():-- setInterval(function, millisecond)
            //It is similar to setTimeout() but it keeps running the function continously with time intervals;
            // Is also Asynchronous
            
            setInterval(function(){
                console.log('interval');

            },3000);

             //   Another way to loop through an array using .forEach(function(value))
             //  .forEach() is the preferred way to loop through an array
             [
                'Make Dinner',
                'Wash Dishes',
                'Watch Youtube'
             ].forEach(function(value,index){   //.forEach() takes the each value and its index and pass it inside a function 
                console.log(index);
                console.log(value);
             });


//----------------------------------------------------------------------------------------------------

     // Advanced Functions Part2

      // Arrow Functions:-  A shorter way to write functions
                        //  Mostly works the same as a regular function


      const arrowfunction=(param1,param2)=> {
        console.log('hello');
      }

      arrowfunction();

      //Some shortcuts of arrow functions:-

      const oneparam=param=>{
        console.log(param+1);
      };
      oneparam(2);

      const oneLine=()=>2+3;
      console.log(oneLine());

      //When passing a function into another function, it is reccomanded to use arraow functions
      //Ex:-   forEach()

      [
                'Make Dinner',
                'Wash Dishes',
                'Watch Youtube'
             ].forEach((value,index)=>{   //.forEach() takes the each value and its index and pass it inside a function 
                console.log(index);
                console.log(value);
             });

//--------------------------------------------------------------------------------------------------------             

    //        .addEventListener(Event,function)   
    // Event = What type of interaction with element do we want to listen to
    // Function:- The function that we want to run after the Event listener goes off
    // Lets us run some code when we interact with the element  (Same as onclick)

    const buttonElement=document.querySelector('.js-button');
    buttonElement.addEventListener('click', ()=>{
        console.log('click1');
    });

    const  eventListenerfunction=()=>{
        console.log('click2');
    };

    buttonElement.addEventListener('click', eventListenerfunction);  //Multiple Event Listeners

    buttonElement.removeEventListener('click', eventListenerfunction);  // Now only prints click1 on clicking button, (click2 is deleted)

    //   attributes(like onclick)   VS    .addEventListener(Event,function)
    //  We can add multiple event listeners for an event
    //  we can remove an event listener using .removeEventListener()

    // Best practice is to use event listeners instead of onclick
    // check 12-auto-play-advanced-functions js and html files

    //  .addEventListener()  with Keydowns
    // What if instead of pressing the button we could press buttons on our keyboard


    document.body.addEventListener('keydown',(event)=>{   // The keydown event give out a event parameter, that can be used to find out wich key is pressed using event.key
        console.log(event.key);
    });

    // MORE FEATURES THAT USE FUNCTIONS AS VALUES

    // 1) .filter() :- is same as forEach()  but the inner function here will return some value
    //                 1) Creates a new array
    //                 2) return true,(ie puts value at index in array )
    //                 3) return false,(ie not put value in array)
    //  The new array created will contain elements from the given array !!!!!!!!!

//Ex:- filter +ve and -ve
console.log([1,-3,5].filter((value,index)=>{
    /*
        if(value>=0){
            return true;
        }else{
            return false;
        }
    */
     return value>=0;         // We can even return truthy or falsy values rather than True or false values

    })

);
    // 2) .map()  // Works like forEach() and .filter()
    //              1) Creates a new array()
    //              2) Whatever we return gets added to new array
    //            .map()  transforms an array into another array

    console.log(
    [1,1,3].map((value,index)=>{
        return value*2;
    }));

    //Compact format of the top snippet using arrow functions

    console.log([1,1,3].map(value=>value*2));

    
    //Closure
    // If a function has access to a value
    // It will always have access to that value
    // Value gets packaged together(encolsed) with the function
    

        </script>
    </body>
</html>
