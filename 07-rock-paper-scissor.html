<!DOCTYPE html>
<html>
    <head>
        <title> Rock Paper Scissors</title>
    </head>
    <body>
        <p> Rock Paper Scissors</p>
        <button onclick="
                console.log(result('rock'));
                 ">Rock</button>
        <button onclick="
                console.log(result('paper'));
                 ">Paper</button>
        <button onclick=" 
                console.log(result('scissor'));
                 ">Scissors</button>
        <script>
            function result(choice){
                const comp1=Math.random();
                let computerMove='';
                let result;
                if(comp1>=0 && comp1<1/3){
                    computerMove='rock';
                }else if(comp1>=1/3 && comp1<2/3){
                    computerMove='paper';
                }else{
                    computerMove='scissor';
                }

                if(choice===computerMove){
                    result= `TIE!, you chose ${choice} and Computer also chose ${computerMove}`;
                }else{
                    if(choice==='rock' && computerMove==='scissor'){
                       result= `YOU WIN!, you chose ${choice} and Computer chose ${computerMove}`;
                    }
                    else if(choice==='rock' && computerMove==='paper'){
                       result= `YOU LOSE!, you chose ${choice} and Computer chose ${computerMove}`;
                    }
                    else if(choice==='paper' && computerMove==='rock'){
                       result= `YOU WIN!, you chose ${choice} and Computer chose ${computerMove}`;
                    }
                    else if(choice==='paper' && computerMove==='scissor'){
                       result= `YOU LOSE!, you chose ${choice} and Computer chose ${computerMove}`;
                    }
                    else if(choice==='scissor' && computerMove==='paper'){
                       result= `YOU WIN!, you chose ${choice} and Computer chose ${computerMove}`;
                    }
                    else if(choice==='scissor' && computerMove==='rock'){
                       result= `YOU LOSE!, you chose ${choice} and Computer chose ${computerMove}`;
                    }
                }
                return result;
            }
             

        </script>

    </body>
</html>
